name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Указываем пути к обоим lock-файлам для корректного кэширования
          cache-dependency-path: |
            package-lock.json
            demo/package-lock.json

      # 1. Собираем основную библиотеку в корне
      - name: Install & build library
        run: |
          npm install
          npm run build

      # 2. Устанавливаем зависимости демо-проекта
      - name: Install demo deps
        working-directory: demo
        run: npm install

      # 3. Собираем демо-проект
      - name: Build demo
        working-directory: demo
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Загружаем именно результат сборки демо
          path: demo/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
